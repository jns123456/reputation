name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: reputation
          POSTGRES_PASSWORD: reputation
          POSTGRES_DB: reputation_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U reputation -d reputation_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DEBUG: "1"
      SECRET_KEY: ci-test-secret-key-with-at-least-fifty-characters-long
      DATABASE_URL: postgres://reputation:reputation@localhost:5432/reputation_test
      ALLOWED_HOSTS: localhost,127.0.0.1
      USE_REDIS_CACHE: "0"
      EMAIL_VERIFICATION_REQUIRED: "0"
      ABUSE_WRITE_GUARD_ENABLED: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y gettext

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Compile messages
        run: python manage.py compilemessages --ignore=.venv

      - name: Run tests
        run: python manage.py test --verbosity 1

  test-write-guard:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: reputation
          POSTGRES_PASSWORD: reputation
          POSTGRES_DB: reputation_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U reputation -d reputation_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DEBUG: "1"
      SECRET_KEY: ci-test-secret-key-with-at-least-fifty-characters-long
      DATABASE_URL: postgres://reputation:reputation@localhost:5432/reputation_test
      ALLOWED_HOSTS: localhost,127.0.0.1
      USE_REDIS_CACHE: "0"
      EMAIL_VERIFICATION_REQUIRED: "0"
      ABUSE_WRITE_GUARD_ENABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y gettext

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run tests with write guard enabled
        run: python manage.py test --verbosity 1

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Dependency audit
        run: |
          python -m pip install --upgrade pip pip-audit
          pip-audit -r requirements.txt
