{% load i18n %}
{% if user.is_authenticated %}
<form method="post" action="{% url 'accounts:bookmark_toggle' %}" class="inline"
      hx-post="{% url 'accounts:bookmark_toggle' %}"
      hx-target="#bookmark-prediction-{{ prediction.id }}"
      hx-swap="innerHTML">
  {% csrf_token %}
  <input type="hidden" name="target_type" value="prediction">
  <input type="hidden" name="target_id" value="{{ prediction.id }}">
  <button type="submit"
          class="forecast-action rounded-full px-2 py-1.5 transition hover:bg-brand-50 hover:text-brand-600 {% if is_bookmarked %}is-bookmarked text-brand-600{% endif %}"
          title="{% if is_bookmarked %}{% trans 'Remove bookmark' %}{% else %}{% trans 'Bookmark' %}{% endif %}"
          aria-label="{% if is_bookmarked %}{% trans 'Remove bookmark' %}{% else %}{% trans 'Bookmark' %}{% endif %}">
    {% if is_bookmarked %}
    <i data-lucide="bookmark" class="h-[18px] w-[18px]" aria-hidden="true"></i>
    {% else %}
    <i data-lucide="bookmark" class="h-[18px] w-[18px]" stroke-width="1.75" aria-hidden="true"></i>
    {% endif %}
  </button>
</form>
{% else %}
<a href="{% url 'accounts:login' %}?next={{ request.path }}"
   class="forecast-action rounded-full px-2 py-1.5 transition hover:bg-brand-50 hover:text-brand-600"
   title="{% trans 'Log in to bookmark' %}">
  <i data-lucide="bookmark" class="h-[18px] w-[18px]" stroke-width="1.75" aria-hidden="true"></i>
</a>
{% endif %}
