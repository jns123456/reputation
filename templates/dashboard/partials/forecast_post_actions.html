{% load i18n %}
<div class="pr-action-bar mt-3 text-slate-500" id="forecast-actions-prediction-{{ prediction.id }}">
  <a href="{% url 'markets:detail' slug=market.slug %}#prediction-discussion-{{ prediction.id }}"
     class="forecast-action group flex items-center gap-1.5 rounded-full px-2 py-1.5 transition hover:bg-brand-50 hover:text-brand-600"
     title="{% if user == prediction.user %}{% trans 'View comments' %}{% else %}{% trans 'Reply' %}{% endif %}"
     onclick="window.focusDiscussionComposer && window.focusDiscussionComposer('prediction-discussion-{{ prediction.id }}'); return false;">
    <svg class="h-[18px] w-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
      <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    {% if comment_count %}<span class="text-xs font-medium tabular-nums">{{ comment_count }}</span>{% endif %}
  </a>

  {% include "dashboard/partials/forecast_vote_actions.html" %}

  <div id="bookmark-prediction-{{ prediction.id }}">
    {% include "dashboard/partials/forecast_bookmark_button.html" %}
  </div>

  <button type="button"
          class="forecast-action group flex items-center rounded-full px-2 py-1.5 transition hover:bg-brand-50 hover:text-brand-600"
          title="{% trans 'Share forecast' %}"
          data-share-url="{{ request.scheme }}://{{ request.get_host }}{% url 'markets:detail' slug=market.slug %}#forecast-{{ prediction.id }}"
          data-share-title="{{ prediction.user.public_name }} on {{ market.title|truncatechars:40 }}"
          onclick="window.shareForumPost && window.shareForumPost(this)">
    <svg class="h-[18px] w-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
      <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="16 6 12 2 8 6" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="12" y1="2" x2="12" y2="15" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</div>
