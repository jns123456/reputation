<a href="{% url 'dashboard:category_browse' slug=category.slug %}{% if active_source %}?source={{ active_source }}{% endif %}"
   class="group relative flex h-full flex-col overflow-hidden rounded-2xl border border-slate-200/80 bg-white p-5 shadow-sm transition duration-300 hover:-translate-y-0.5 hover:border-slate-300 hover:shadow-lg focus:outline-none focus-visible:ring-2 focus-visible:ring-brand-500 focus-visible:ring-offset-2">
  <div class="pointer-events-none absolute inset-0 bg-gradient-to-br {{ category.card_hover }}" aria-hidden="true"></div>
  <div class="pointer-events-none absolute -right-6 -top-6 h-24 w-24 rounded-full {{ category.card_glow }} blur-2xl transition duration-300 group-hover:scale-110" aria-hidden="true"></div>

  <div class="relative flex items-start justify-between gap-3">
    <div class="flex h-12 w-12 shrink-0 items-center justify-center rounded-xl ring-1 {{ category.icon_bg }} {{ category.ring }} transition duration-300 group-hover:scale-105">
      {% include "dashboard/partials/category_icon.html" with slug=category.slug class=category.icon_fg %}
    </div>
    <span class="inline-flex items-center rounded-full bg-slate-100 px-2.5 py-1 text-xs font-semibold tabular-nums text-slate-700 ring-1 ring-slate-200/80">
      {{ count }}
    </span>
  </div>

  <div class="relative mt-4 flex flex-1 flex-col">
    <h3 class="text-base font-bold text-slate-900 transition group-hover:text-brand-700">{{ category.name }}</h3>
    <p class="mt-1 line-clamp-2 flex-1 text-sm leading-snug text-slate-500">{{ category.description }}</p>
    <div class="mt-4 flex items-center justify-between gap-2 border-t border-slate-100 pt-4">
      <span class="text-sm font-medium text-slate-600">
        {{ count }} forecast{{ count|pluralize }}
      </span>
      <span class="inline-flex items-center gap-1 text-sm font-semibold text-brand-600 opacity-0 transition duration-300 group-hover:opacity-100">
        Browse
        <svg class="h-4 w-4 transition group-hover:translate-x-0.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
        </svg>
      </span>
    </div>
  </div>
</a>
