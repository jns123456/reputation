{% load reputation_filters i18n %}
<label class="challenge-market-card group relative block h-full cursor-pointer">
  <input type="checkbox"
         value="{{ market.id }}"
         data-title="{{ market.title }}"
         class="peer sr-only"
         {% if market.id in selected_market_ids %}checked{% endif %}>
  <div class="challenge-market-card-check" aria-hidden="true">
    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
      <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
    </svg>
  </div>
  <article class="challenge-market-card-inner pr-card">
    <div class="challenge-market-card-top">
      {% if market.image_url %}
      <div class="challenge-market-card-thumb">
        <img src="{{ market.image_url }}" alt="" class="h-full w-full object-contain" loading="lazy">
      </div>
      {% else %}
      <div class="challenge-market-card-thumb challenge-market-card-thumb--fallback" aria-hidden="true">
        {{ market.title|slice:":1"|upper }}
      </div>
      {% endif %}
      <h3 class="challenge-market-card-title" title="{{ market.title }}">
        {{ market.title }}
      </h3>
    </div>

    {% if market.current_probability %}
    <div class="challenge-market-card-odds">
      {% for label, prob in market.current_probability.items %}
      <div class="challenge-market-card-odd
        {% if label|lower == 'yes' %}challenge-market-card-odd--yes{% elif label|lower == 'no' %}challenge-market-card-odd--no{% endif %}">
        <span class="challenge-market-card-odd-label">
          {% if label|lower == 'yes' %}{% trans "Yes" %}{% elif label|lower == 'no' %}{% trans "No" %}{% else %}{{ label }}{% endif %}
        </span>
        <span class="challenge-market-card-odd-value">{{ prob|as_percent }}%</span>
      </div>
      {% endfor %}
    </div>
    {% else %}
    <p class="challenge-market-card-no-odds">{% trans "Odds unavailable" %}</p>
    {% endif %}

    <footer class="challenge-market-card-foot">
      {% if market.close_date %}
      <p class="challenge-market-card-date">
        {% blocktrans with date=market.close_date|date:"M j, Y" %}Closes {{ date }}{% endblocktrans %}
      </p>
      {% endif %}
      {% with countdown=market.expiration_countdown %}
      {% if countdown %}
      <span class="challenge-market-card-countdown challenge-market-card-countdown--{{ countdown.tone }}">
        {{ countdown.text }}
      </span>
      {% endif %}
      {% endwith %}
      <div class="challenge-market-card-tags">
        {% if market.volume_label %}<span class="challenge-market-card-volume">{{ market.volume_label }}</span>{% endif %}
        <div class="challenge-market-card-badges">
          {% if market.source == "kalshi" %}
          <span class="challenge-market-card-badge challenge-market-card-badge--kalshi">Kalshi</span>
          {% elif market.source == "polymarket" %}
          <span class="challenge-market-card-badge challenge-market-card-badge--poly">Polymarket</span>
          {% endif %}
          {% if market.category %}
          <span class="challenge-market-card-badge">{{ market.category }}</span>
          {% endif %}
        </div>
      </div>
    </footer>
  </article>
</label>
