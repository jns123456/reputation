{% load reputation_filters i18n %}
<label class="challenge-market-card group relative block h-full cursor-pointer">
  <input type="checkbox"
         value="{{ market.id }}"
         data-title="{{ market.display_title }}"
         class="peer sr-only"
         {% if market.id in selected_market_ids %}checked{% endif %}>
  <div class="challenge-market-card-check" aria-hidden="true">
    <i data-lucide="check" class="h-4 w-4" stroke-width="3" aria-hidden="true"></i>
  </div>
  <article class="challenge-market-card-inner pr-card flex h-full flex-col rounded-xl border border-slate-200/80 bg-white/90 shadow-sm backdrop-blur-sm dark:border-slate-700 dark:bg-slate-800/90">
    {% if market.is_soccer_match or market.is_h2h_match %}
    {% include "markets/partials/market_card_match_header.html" with header_padding_class="pr-7" title_class="challenge-market-card-title mt-1 line-clamp-3 text-base font-bold leading-snug text-slate-900 dark:text-slate-100" match_icon_slug=market.canonical_category_slug|default:"sports" %}
    {% else %}
    <div class="flex gap-3 pr-7">
      {% if market.image_url %}
      <div class="flex h-11 w-11 shrink-0 items-center justify-center overflow-hidden rounded-lg border border-slate-100 bg-white p-1 dark:border-slate-500 dark:bg-white/90">
        <img src="{{ market.image_url }}" alt="" class="h-full w-full object-contain" loading="lazy">
      </div>
      {% else %}
      <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-lg bg-gradient-to-br from-slate-100 to-slate-200 text-sm font-bold text-slate-500 dark:from-slate-700 dark:to-slate-600 dark:text-slate-300" aria-hidden="true">
        {{ market.display_title|slice:":1"|upper }}
      </div>
      {% endif %}
      <h3 class="challenge-market-card-title line-clamp-3 min-h-[3.75rem] flex-1 text-sm font-semibold leading-snug text-slate-900 dark:text-slate-100">
        {{ market.display_title }}
      </h3>
    </div>
    {% endif %}

    {% include "markets/partials/market_card_outcomes.html" %}
    {% include "markets/partials/market_card_footer.html" %}
  </article>
</label>
