{% load i18n %}
{% if standings %}
<div class="{% if compact %}mt-1.5{% else %}mt-3{% endif %} overflow-x-auto">
  <table class="w-full text-left {% if compact %}text-xs{% else %}text-sm{% endif %}">
    <thead>
      <tr class="border-b border-slate-200 text-slate-500 dark:border-slate-600 dark:text-slate-400">
        <th class="pb-1.5 pr-2 font-medium">#</th>
        <th class="pb-1.5 pr-2 font-medium">{% trans "Player" %}</th>
        <th class="pb-1.5 text-right font-medium">{% trans "Rep" %}</th>
      </tr>
    </thead>
    <tbody>
      {% for row in standings %}
      <tr class="border-b border-slate-100 last:border-0 dark:border-slate-700">
        <td class="py-1.5 pr-2 tabular-nums text-slate-500 dark:text-slate-400">{{ row.rank }}</td>
        <td class="py-1.5 pr-2 font-medium text-slate-800 dark:text-slate-100">{{ row.participant.user.public_name }}</td>
        <td class="py-1.5 text-right font-semibold tabular-nums {% if row.reputation_points >= 0 %}text-emerald-700 dark:text-emerald-400{% else %}text-rose-700 dark:text-rose-400{% endif %}">
          {% if row.reputation_points >= 0 %}+{% endif %}{{ row.reputation_points }}
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endif %}
