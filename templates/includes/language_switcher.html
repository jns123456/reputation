{% load i18n i18n_extras %}
{% get_current_language as CURRENT_LANGUAGE %}
<div class="relative" x-data="{ open: false }" @click.outside="open = false">
  <button type="button"
          @click="open = !open"
          class="inline-flex items-center gap-1.5 rounded-lg border border-slate-200 bg-slate-50 px-2.5 py-2 text-sm font-semibold text-slate-700 transition hover:border-slate-300 hover:bg-white hover:text-brand-700 dark:border-slate-600 dark:bg-slate-800 dark:text-slate-200 dark:hover:border-slate-500 dark:hover:bg-slate-700 dark:hover:text-brand-400"
          :aria-expanded="open"
          aria-label="{% trans 'Language' %}">
    <span class="text-lg leading-none" aria-hidden="true">{{ CURRENT_LANGUAGE|language_flag }}</span>
    <svg class="h-3.5 w-3.5 text-slate-400 transition" :class="open && 'rotate-180'" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
    </svg>
  </button>
  <div x-show="open" x-cloak x-transition
       class="absolute right-0 top-full z-50 mt-1 min-w-[10rem] overflow-hidden rounded-xl border border-slate-200 bg-white py-1 shadow-lg dark:border-slate-700 dark:bg-slate-800">
    {% get_available_languages as AVAILABLE_LANGUAGES %}
    {% get_language_info_list for AVAILABLE_LANGUAGES as language_infos %}
    {% for language in language_infos %}
    <form method="post" action="{% url 'set_language' %}">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ request.get_full_path }}">
      <input type="hidden" name="language" value="{{ language.code }}">
      <button type="submit"
              class="flex w-full items-center gap-3 px-4 py-2.5 text-left text-sm transition hover:bg-slate-50 dark:hover:bg-slate-700 {% if language.code == CURRENT_LANGUAGE %}font-semibold text-brand-700 dark:text-brand-400{% else %}text-slate-700 dark:text-slate-200{% endif %}">
        <span class="text-lg leading-none" aria-hidden="true">{{ language.code|language_flag }}</span>
        <span class="flex-1">{{ language.name_local }}</span>
        {% if language.code == CURRENT_LANGUAGE %}
        <svg class="h-4 w-4 shrink-0 text-brand-600 dark:text-brand-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
        </svg>
        {% endif %}
      </button>
    </form>
    {% endfor %}
  </div>
</div>
