{% load i18n %}
<section class="border-t border-slate-200 bg-gradient-to-b from-slate-50 to-white px-4 py-5 sm:px-5 dark:border-slate-700 dark:from-slate-800/70 dark:to-slate-900/30">
  <div class="mb-4 flex flex-wrap items-center justify-between gap-2">
    <div>
      <h3 class="text-sm font-semibold text-slate-800 dark:text-slate-100">
        {% trans "Discussion" %}
        {% if comment_count %}<span class="ml-1 rounded-full bg-slate-200 px-2 py-0.5 text-xs font-medium text-slate-600 dark:bg-slate-700 dark:text-slate-300">{{ comment_count }}</span>{% endif %}
      </h3>
      <p class="mt-0.5 text-xs text-slate-500 dark:text-slate-400">{% blocktrans %}Debate this forecast — likes on comments earn <span class="badge-pop">Popularity</span> for the author{% endblocktrans %}</p>
    </div>
  </div>

  {% include "comments/partials/prediction_discussion_inner.html" %}
</section>
