{% load i18n %}
<section class="border-t border-slate-200 bg-gradient-to-b from-slate-50 to-white px-4 py-5 sm:px-5">
  <div class="mb-4 flex flex-wrap items-center justify-between gap-2">
    <div>
      <h3 class="text-sm font-semibold text-slate-800">
        {% trans "Discussion" %}
        {% if comment_count %}<span class="ml-1 rounded-full bg-slate-200 px-2 py-0.5 text-xs font-medium text-slate-600">{{ comment_count }}</span>{% endif %}
      </h3>
      <p class="mt-0.5 text-xs text-slate-500">{% blocktrans %}Debate this forecast — likes on comments earn <span class="badge-pop">Popularity</span> for the author{% endblocktrans %}</p>
    </div>
  </div>

  {% include "comments/partials/prediction_discussion_inner.html" %}
</section>
