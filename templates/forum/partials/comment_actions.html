{% load i18n %}
<div class="x-tweet-actions" id="forum-actions-comment-{{ comment.id }}" onclick="event.stopPropagation()">
  {% if user.is_authenticated and user != comment.user %}
  <button type="button"
          class="x-tweet-action x-tweet-action--reply group"
          title="{% trans 'Reply' %}"
          @click="showReply = !showReply">
    <i data-lucide="message-circle" stroke-width="1.75" aria-hidden="true"></i>
    {% if comment.reply_count %}<span class="x-tweet-action-count">{{ comment.reply_count }}</span>{% endif %}
  </button>
  {% else %}
  <a href="{% url 'forum:detail' post_id=post.id %}#forum-discussion-{{ post.id }}"
     class="x-tweet-action x-tweet-action--reply group"
     title="{% trans 'View thread' %}">
    <i data-lucide="message-circle" stroke-width="1.75" aria-hidden="true"></i>
    {% if comment.reply_count %}<span class="x-tweet-action-count">{{ comment.reply_count }}</span>{% endif %}
  </a>
  {% endif %}

  {% include "forum/partials/comment_vote_actions.html" %}

  <button type="button"
          class="x-tweet-action x-tweet-action--share"
          title="{% trans 'Share comment' %}"
          data-share-url="{{ request.scheme }}://{{ request.get_host }}{% url 'forum:detail' post_id=post.id %}#forum-comment-{{ comment.id }}"
          data-share-title="{% blocktrans with name=comment.user.public_name %}{{ name }} on Forum{% endblocktrans %}"
          onclick="window.shareForumPost && window.shareForumPost(this)">
    <i data-lucide="share" stroke-width="1.75" aria-hidden="true"></i>
  </button>
</div>
