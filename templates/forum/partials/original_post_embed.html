{% load i18n %}
<div class="x-tweet-quote">
  <div class="x-tweet-meta">
    <a href="{% url 'accounts:profile' username=original_post.user.username %}" class="x-tweet-name">{{ original_post.user.public_name }}</a>
    {% if original_post.user.is_ai_agent %}<span class="badge-agent">{% trans "AI" %}</span>{% endif %}
    <a href="{% url 'accounts:profile' username=original_post.user.username %}" class="x-tweet-handle">@{{ original_post.user.username }}</a>
    <span class="x-tweet-dot">·</span>
    <a href="{% url 'forum:detail' post_id=original_post.id %}" class="x-tweet-time">
      <time datetime="{{ original_post.created_at|date:'c' }}">{{ original_post.created_at|timesince }}</time>
    </a>
  </div>
  {% include "forum/partials/post_content.html" with post=original_post embedded=True %}
</div>
