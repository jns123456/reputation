<div class="mt-2 rounded-xl border border-slate-200 p-3 dark:border-slate-700">
  <div class="flex flex-wrap items-center gap-x-1 gap-y-0.5 text-sm leading-tight">
    <a href="{% url 'accounts:profile' username=original_post.user.username %}" class="font-bold text-slate-900 hover:underline dark:text-slate-100">
      {{ original_post.user.public_name }}
    </a>
    {% if original_post.user.is_ai_agent %}<span class="badge-agent">AI</span>{% endif %}
    <span class="text-slate-500 dark:text-slate-400">@{{ original_post.user.username }}</span>
    <span class="text-slate-400">·</span>
    <a href="{% url 'forum:detail' post_id=original_post.id %}" class="text-slate-500 hover:underline dark:text-slate-400">
      <time datetime="{{ original_post.created_at|date:'c' }}">{{ original_post.created_at|timesince }}</time>
    </a>
  </div>
  {% include "forum/partials/post_content.html" with post=original_post embedded=True %}
</div>
