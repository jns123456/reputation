{% load i18n %}
<div id="repost-forum-post-{{ original_post.id }}">
  {% if user.is_authenticated and original_post.user != user %}
  <form method="post" action="{% url 'forum:repost' post_id=original_post.id %}" class="inline"
        hx-post="{% url 'forum:repost' post_id=original_post.id %}"
        hx-target="#repost-forum-post-{{ original_post.id }}"
        hx-swap="outerHTML">
    {% csrf_token %}
    <button type="submit"
            class="x-tweet-action x-tweet-action--repost {% if is_reposted %}is-active{% endif %}"
            title="{% if is_reposted %}{% trans 'Undo repost' %}{% else %}{% trans 'Repost' %}{% endif %}"
            aria-label="{% if is_reposted %}{% trans 'Undo repost' %}{% else %}{% trans 'Repost' %}{% endif %}">
      <i data-lucide="repeat-2" stroke-width="1.75" aria-hidden="true"></i>
      {% if repost_count %}<span class="x-tweet-action-count">{{ repost_count }}</span>{% endif %}
    </button>
  </form>
  {% elif user.is_authenticated %}
  <span class="x-tweet-action x-tweet-action--repost is-disabled" title="{% trans "You can't repost your own post" %}">
    <i data-lucide="repeat-2" stroke-width="1.75" aria-hidden="true"></i>
    {% if repost_count %}<span class="x-tweet-action-count">{{ repost_count }}</span>{% endif %}
  </span>
  {% else %}
  <a href="{% url 'accounts:login' %}?next={{ request.path }}"
     class="x-tweet-action x-tweet-action--repost"
     title="{% trans 'Log in to repost' %}">
    <i data-lucide="repeat-2" stroke-width="1.75" aria-hidden="true"></i>
    {% if repost_count %}<span class="x-tweet-action-count">{{ repost_count }}</span>{% endif %}
  </a>
  {% endif %}
</div>
