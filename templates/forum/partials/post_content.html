{% load i18n %}
{% if post.body %}
<p class="mt-2 whitespace-pre-wrap text-[15px] leading-relaxed text-slate-900 dark:text-slate-100">{{ post.body }}</p>
{% endif %}

{% if post.image %}
<a href="{% url 'forum:detail' post_id=post.id %}" class="{% if embedded %}mt-2{% else %}mt-3{% endif %} block overflow-hidden rounded-xl border border-slate-200 dark:border-slate-700">
  <img src="{{ post.image.url }}" alt="" class="w-full object-cover {% if embedded %}max-h-64{% else %}max-h-96{% endif %}">
</a>
{% endif %}
