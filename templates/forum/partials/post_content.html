{% load i18n mention_tags %}
{% if post.body %}
<p class="x-tweet-text">{{ post.body|linkify_mentions }}</p>
{% endif %}

{% if post.image %}
<a href="{% url 'forum:detail' post_id=post.id %}" class="x-tweet-media" onclick="event.stopPropagation()">
  <img src="{{ post.image.url }}" alt="" class="{% if embedded %}max-h-64{% else %}max-h-96{% endif %}">
</a>
{% endif %}

{% include "forum/partials/post_poll.html" %}
