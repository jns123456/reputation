{% load i18n %}
{% if new_feed_item %}
<article hx-swap-oob="afterbegin:#forum-feed">
  {% include "forum/partials/post_card_from_item.html" with item=new_feed_item %}
</article>
{% endif %}

{% if removed_repost_id %}
<div hx-swap-oob="delete:#forum-post-{{ removed_repost_id }}"></div>
{% endif %}

<div id="repost-forum-post-{{ original_post.id }}">
  {% include "forum/partials/repost_button.html" %}
</div>
