<form method="post"
      action="{% url 'forum:comment' post_id=post.id %}"
      hx-post="{% url 'forum:comment' post_id=post.id %}"
      hx-target="#pulse-discussion-inner-{{ post.id }}"
      hx-swap="outerHTML"
      class="{% if variant == 'composer' %}comment-composer{% endif %}">
  {% csrf_token %}
  {% if parent_comment %}
  <input type="hidden" name="parent_comment" value="{{ parent_comment.id }}">
  {% endif %}
  <textarea name="body"
            rows="{% if variant == 'composer' %}3{% else %}2{% endif %}"
            placeholder="{{ placeholder|default:'Write a comment…' }}"
            class="form-textarea comment-composer-input w-full"
            required></textarea>
  <div class="mt-2 flex items-center gap-2">
    <button type="submit" class="btn-primary text-sm">{% if parent_comment %}Reply{% else %}Comment{% endif %}</button>
    {% if show_cancel %}
    <button type="button" class="btn-secondary text-sm" @click="{{ cancel_action }}">Cancel</button>
    {% endif %}
  </div>
</form>
