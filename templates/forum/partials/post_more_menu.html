{% load i18n %}
<div class="x-tweet-menu"
     :class="{ 'is-open': open }"
     x-data="{ open: false, confirmDelete: false }"
     @click.outside="open = false"
     @keydown.escape.window="open = false; confirmDelete = false">
  <button type="button"
          class="x-tweet-more"
          aria-label="{% trans 'More' %}"
          :aria-expanded="open"
          @click.stop="open = !open">
    <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
  </button>

  <div x-show="open"
       x-cloak
       x-transition:enter="transition ease-out duration-150"
       x-transition:enter-start="opacity-0 scale-95"
       x-transition:enter-end="opacity-100 scale-100"
       x-transition:leave="transition ease-in duration-100"
       x-transition:leave-start="opacity-100 scale-100"
       x-transition:leave-end="opacity-0 scale-95"
       class="x-tweet-menu-dropdown"
       role="menu"
       @click.stop>
    <a href="{% url 'forum:detail' post_id=post.id %}"
       class="x-tweet-menu-item"
       role="menuitem"
       @click="open = false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" stroke-linecap="round" stroke-linejoin="round"/></svg>
      {% trans "View post" %}
    </a>

    <button type="button"
            class="x-tweet-menu-item"
            role="menuitem"
            data-copy-url="{{ request.scheme }}://{{ request.get_host }}{% url 'forum:detail' post_id=post.id %}"
            @click="window.copyForumPostLink && window.copyForumPostLink($el); open = false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" stroke-linecap="round" stroke-linejoin="round"/></svg>
      {% trans "Copy link" %}
    </button>

    <button type="button"
            class="x-tweet-menu-item"
            role="menuitem"
            data-share-url="{{ request.scheme }}://{{ request.get_host }}{% url 'forum:detail' post_id=post.id %}"
            data-share-title="{% blocktrans with name=post.user.public_name %}{{ name }} on Forum{% endblocktrans %}"
            @click="window.shareForumPost && window.shareForumPost($el); open = false">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8" stroke-linecap="round" stroke-linejoin="round"/><polyline points="16 6 12 2 8 6" stroke-linecap="round" stroke-linejoin="round"/><line x1="12" y1="2" x2="12" y2="15" stroke-linecap="round" stroke-linejoin="round"/></svg>
      {% trans "Share post" %}
    </button>

    {% if user.is_authenticated %}
    <form method="post"
          action="{% url 'accounts:bookmark_toggle' %}"
          hx-post="{% url 'accounts:bookmark_toggle' %}"
          hx-target="#bookmark-forum-post-{{ post.id }}"
          hx-swap="innerHTML"
          role="none"
          @htmx:after-request="open = false">
      {% csrf_token %}
      <input type="hidden" name="target_type" value="pulse_post">
      <input type="hidden" name="target_id" value="{{ post.id }}">
      <button type="submit" class="x-tweet-menu-item" role="menuitem">
        <svg viewBox="0 0 24 24" fill="{% if is_bookmarked %}currentColor{% else %}none{% endif %}" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><path d="M6 2a2 2 0 0 0-2 2v16l8-4.5 8 4.5V4a2 2 0 0 0-2-2H6z" stroke-linecap="round" stroke-linejoin="round"/></svg>
        {% if is_bookmarked %}{% trans "Remove bookmark" %}{% else %}{% trans "Bookmark" %}{% endif %}
      </button>
    </form>
    {% endif %}

    {% if user.is_authenticated and user == post.user %}
    <form x-ref="deleteForm"
          method="post"
          action="{% url 'forum:delete' post_id=post.id %}"
          hx-post="{% url 'forum:delete' post_id=post.id %}"
          class="hidden"
          {% if redirect_after_delete %}
          hx-swap="none"
          {% else %}
          hx-target="#forum-post-{{ post.id }}"
          hx-swap="delete"
          {% endif %}
          @htmx:after-request="if ($event.detail.successful) { open = false; confirmDelete = false; }">
      {% csrf_token %}
      {% if redirect_after_delete %}
      <input type="hidden" name="redirect" value="1">
      {% endif %}
    </form>

    <button type="button"
            class="x-tweet-menu-item x-tweet-menu-item--danger"
            role="menuitem"
            @click.stop="open = false; confirmDelete = true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true"><polyline points="3 6 5 6 21 6" stroke-linecap="round" stroke-linejoin="round"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      {% trans "Delete post" %}
    </button>

    <template x-teleport="body">
    <div x-show="confirmDelete"
         x-cloak
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0"
         x-transition:enter-end="opacity-100"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100"
         x-transition:leave-end="opacity-0"
         class="x-confirm-modal"
         role="dialog"
         aria-modal="true"
         aria-labelledby="delete-post-title-{{ post.id }}"
         @click.stop>
      <button type="button"
              class="x-confirm-backdrop"
              aria-label="{% trans 'Close' %}"
              @click="confirmDelete = false"></button>
      <div class="x-confirm-panel"
           x-transition:enter="transition ease-out duration-200"
           x-transition:enter-start="opacity-0 scale-95 translate-y-2"
           x-transition:enter-end="opacity-100 scale-100 translate-y-0"
           x-transition:leave="transition ease-in duration-150"
           x-transition:leave-start="opacity-100 scale-100 translate-y-0"
           x-transition:leave-end="opacity-0 scale-95 translate-y-2">
        <h2 id="delete-post-title-{{ post.id }}" class="x-confirm-title">{% trans "Delete post?" %}</h2>
        <p class="x-confirm-text">{% trans "This can't be undone and will remove your post from the feed." %}</p>
        <div class="x-confirm-actions">
          <button type="button"
                  class="x-confirm-btn x-confirm-btn--cancel"
                  @click="confirmDelete = false">
            {% trans "Cancel" %}
          </button>
          <button type="button"
                  class="x-confirm-btn x-confirm-btn--danger"
                  @click="confirmDelete = false; htmx.trigger($refs.deleteForm, 'submit')">
            {% trans "Delete" %}
          </button>
        </div>
      </div>
    </div>
    </template>
    {% endif %}
  </div>
</div>
