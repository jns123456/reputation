{% load i18n %}
{% if attestation %}
<a href="{% url 'integrations:attestation_detail' uid=attestation.uid %}"
   class="inline-flex items-center gap-1 rounded-full bg-slate-100 px-2 py-0.5 text-[11px] font-medium text-slate-500 transition hover:bg-slate-200 hover:text-slate-700 dark:bg-slate-800 dark:text-slate-400 dark:hover:bg-slate-700 dark:hover:text-slate-200"
   title="{% trans 'This forecast has a ProofRep verification record' %}">
  <i data-lucide="shield-check" class="h-3 w-3" aria-hidden="true"></i>
  <span>{% trans "Verified record" %}</span>
</a>
{% endif %}
