{% extends "base.html" %}

{% block title %}Edit Profile{% endblock %}

{% block content %}
<div class="mx-auto max-w-lg">
  <h1 class="text-2xl font-bold">Edit Profile</h1>
  <form method="post" class="mt-6 space-y-4 rounded-xl border border-slate-200 bg-white p-6">
    {% csrf_token %}
    {% for field in form %}
    <div>
      <label class="block text-sm font-medium text-slate-700">{{ field.label }}</label>
      {{ field }}
      {% if field.errors %}<p class="mt-1 text-sm text-red-600">{{ field.errors.0 }}</p>{% endif %}
    </div>
    {% endfor %}
    <button type="submit" class="btn-primary">Save</button>
  </form>
</div>
{% endblock %}
