{% load i18n %}
{# form.identity_mode field + Alpine mode binding from parent #}
<fieldset class="space-y-3">
  <legend class="text-sm font-medium text-slate-700 dark:text-slate-200">{{ form.identity_mode.label }}</legend>

  <div class="grid gap-3 sm:grid-cols-3">
    <label class="identity-mode-card group cursor-pointer"
           :class="mode === 'public' && 'identity-mode-card--active'">
      <input type="radio" name="identity_mode" value="public" class="sr-only" x-model="mode"
             {% if form.identity_mode.value == 'public' or not form.identity_mode.value %}checked{% endif %}>
      <span class="identity-mode-icon bg-sky-100 text-sky-700 dark:bg-sky-900/40 dark:text-sky-300">
        <i data-lucide="user" class="h-4 w-4" stroke-width="2" aria-hidden="true"></i>
      </span>
      <span class="identity-mode-title">{% trans "Public" %}</span>
      <span class="identity-mode-desc">{% trans "Your name and @username are visible — best for building reputation under your real identity." %}</span>
    </label>

    <label class="identity-mode-card group cursor-pointer"
           :class="mode === 'pseudonym' && 'identity-mode-card--active'">
      <input type="radio" name="identity_mode" value="pseudonym" class="sr-only" x-model="mode"
             {% if form.identity_mode.value == 'pseudonym' %}checked{% endif %}>
      <span class="identity-mode-icon bg-violet-100 text-violet-700 dark:bg-violet-900/40 dark:text-violet-300">
        <i data-lucide="tag" class="h-4 w-4" stroke-width="2" aria-hidden="true"></i>
      </span>
      <span class="identity-mode-title">{% trans "Pseudonym" %}</span>
      <span class="identity-mode-desc">{% trans "Use a creative alias as your main name. @username stays visible on your profile." %}</span>
    </label>

    <label class="identity-mode-card group cursor-pointer"
           :class="mode === 'anonymous' && 'identity-mode-card--active'">
      <input type="radio" name="identity_mode" value="anonymous" class="sr-only" x-model="mode"
             {% if form.identity_mode.value == 'anonymous' %}checked{% endif %}>
      <span class="identity-mode-icon bg-slate-200 text-slate-700 dark:bg-slate-700 dark:text-slate-200">
        <i data-lucide="eye-off" class="h-4 w-4" stroke-width="2" aria-hidden="true"></i>
      </span>
      <span class="identity-mode-title">{% trans "Anonymous" %}</span>
      <span class="identity-mode-desc">{% trans "Hide @username in public posts. Use an alias so people can still recognize you." %}</span>
    </label>
  </div>

  {% if form.identity_mode.errors %}
  <p class="text-sm text-red-600 dark:text-red-400">{{ form.identity_mode.errors.0 }}</p>
  {% endif %}
</fieldset>
