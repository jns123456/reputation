{% load i18n %}
{% if form.audience %}
<fieldset class="mt-4 rounded-xl border border-slate-200 bg-slate-50/80 p-4 dark:border-slate-600 dark:bg-slate-800/50">
  <legend class="text-xs font-semibold uppercase tracking-wide text-slate-500 dark:text-slate-400">
    {{ form.audience.label }}
  </legend>
  <div class="mt-2 flex flex-col gap-2 sm:flex-row sm:gap-4">
    {% for radio in form.audience %}
    <label class="inline-flex cursor-pointer items-center gap-2 text-sm text-slate-700 dark:text-slate-200">
      {{ radio.tag }}
      <span>{{ radio.choice_label }}</span>
    </label>
    {% endfor %}
  </div>
</fieldset>
{% endif %}
