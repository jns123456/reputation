{% load i18n %}
<div id="follow-user-{{ profile_user.username }}" class="pr-profile-follow">
{% if user.is_authenticated and user != profile_user %}
<form method="post" action="{% url 'accounts:follow_toggle' %}" class="inline">
  {% csrf_token %}
  <input type="hidden" name="username" value="{{ profile_user.username }}">
  <button type="submit"
          class="{% if is_following %}btn-secondary{% else %}btn-primary{% endif %}">
    {% if is_following %}{% trans "Following" %}{% else %}{% trans "Follow" %}{% endif %}
  </button>
</form>
{% elif not user.is_authenticated %}
<a href="{% url 'accounts:login' %}?next={{ request.path }}" class="btn-primary">{% trans "Follow" %}</a>
{% endif %}
</div>
