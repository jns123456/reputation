{% load i18n %}
<div id="follow-user-{{ profile_user.username }}" class="shrink-0">
{% if user.is_authenticated and user != profile_user %}
<form method="post"
      action="{% url 'accounts:follow_toggle' %}"
      class="inline"
      hx-post="{% url 'accounts:follow_toggle' %}"
      hx-target="#follow-user-{{ profile_user.username }}"
      hx-swap="outerHTML">
  {% csrf_token %}
  <input type="hidden" name="username" value="{{ profile_user.username }}">
  <input type="hidden" name="context" value="list">
  <button type="submit"
          class="btn-secondary pr-touch-target whitespace-nowrap text-sm {% if profile_user.id not in following_ids %}!border-brand-200 !bg-brand-50 !text-brand-700 dark:!border-brand-800 dark:!bg-brand-950/40 dark:!text-brand-300{% endif %}">
    {% if profile_user.id in following_ids %}{% trans "Unfollow" %}{% else %}{% trans "Follow" %}{% endif %}
  </button>
</form>
{% elif not user.is_authenticated %}
<a href="{% url 'accounts:login' %}?next={{ request.path|urlencode }}" class="btn-secondary pr-touch-target whitespace-nowrap text-sm">{% trans "Follow" %}</a>
{% endif %}
</div>
