{% load i18n notification_tags %}

<div id="notification-{{ notification.id }}"
     class="group relative flex gap-3 rounded-lg px-3 py-2.5 transition {% if compact %}hover:bg-slate-50 dark:hover:bg-slate-700/60{% else %}rounded-xl border p-4 {% if not notification.is_read %}border-brand-200 bg-brand-50/40 dark:border-brand-700/50 dark:bg-brand-950/35{% else %}border-slate-200 bg-white dark:border-slate-700 dark:bg-slate-800{% endif %}{% endif %} {% if not notification.is_read and compact %}bg-brand-50/60 dark:border-l-2 dark:border-brand-400/70 dark:bg-brand-950/50{% endif %}">
  <div class="flex h-9 w-9 shrink-0 items-center justify-center rounded-full {% notification_icon_bg notification %}">
    {% notification_icon notification %}
  </div>
  <div class="min-w-0 flex-1">
    <div class="text-sm leading-snug {% if not notification.is_read %}font-medium text-slate-900 dark:text-slate-50{% else %}text-slate-600 dark:text-slate-200{% endif %}">
      {% notification_message notification compact=compact %}
    </div>
    <p class="mt-0.5 text-xs text-slate-500 dark:text-slate-400 group-hover:dark:text-slate-300">{% blocktrans with time=notification.created_at|timesince %}{{ time }} ago{% endblocktrans %}</p>
  </div>
  <a href="{% url 'accounts:notification_open' notification_id=notification.id %}"
     class="absolute inset-0"
     aria-label="{% trans 'View notification' %}"></a>
</div>
