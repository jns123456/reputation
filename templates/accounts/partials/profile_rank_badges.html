{% load i18n %}
{% if platform_rank_badges %}
<div class="pr-profile-rank-badges{% if compact %} pr-profile-rank-badges--{{ compact }}{% endif %}" aria-label="{% trans 'Platform ranking badge' %}">
  {% for badge in platform_rank_badges %}
  <span class="pr-profile-rank-badge pr-profile-rank-badge--reputation_relative" tabindex="0">
    <span class="pr-profile-rank-badge-value">#{{ badge.rank }}</span>
    <span class="pr-profile-rank-badge-tip" role="tooltip">
      {% blocktrans with rank=badge.rank %}#{{ rank }} in reputation per forecast — relative platform ranking.{% endblocktrans %}
    </span>
  </span>
  {% endfor %}
</div>
{% endif %}
