{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="mx-auto max-w-md">
  <h1 class="text-2xl font-bold">Log in</h1>
  <form method="post" class="mt-6 space-y-4 rounded-xl border border-slate-200 bg-white p-6">
    {% csrf_token %}
    {% if form.non_field_errors %}
    <div class="rounded-lg bg-red-50 p-3 text-sm text-red-800">{{ form.non_field_errors }}</div>
    {% endif %}
    <div>
      <label class="block text-sm font-medium text-slate-700">Username</label>
      <input type="text" name="username" required class="form-input mt-1" autofocus>
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700">Password</label>
      <input type="password" name="password" required class="form-input mt-1">
    </div>
    <button type="submit" class="btn-primary w-full justify-center">Log in</button>
  </form>
  <p class="mt-4 text-center text-sm text-slate-500">
    No account? <a href="{% url 'accounts:signup' %}" class="text-brand-600 hover:underline">Sign up</a>
  </p>
</div>
{% endblock %}
