<div class="mt-3 flex flex-wrap items-center gap-x-4 gap-y-2 text-slate-500">
  <a href="{% url 'markets:detail' slug=prediction.market.slug %}#prediction-discussion-{{ prediction.id }}"
     class="group flex items-center gap-1.5 rounded-full px-1 py-0.5 transition hover:text-brand-600"
     title="Comments">
    <svg class="h-[18px] w-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
      <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="text-xs font-medium tabular-nums">{{ prediction.comment_count }}</span>
  </a>

  <span class="flex items-center gap-1.5" title="Likes">
    {% include "comments/partials/vote_thumb_icon.html" with direction="up" class="h-[18px] w-[18px]" %}
    <span class="text-xs font-medium tabular-nums text-emerald-700">{{ prediction.like_count }}</span>
  </span>

  <span class="flex items-center gap-1.5" title="Dislikes">
    {% include "comments/partials/vote_thumb_icon.html" with direction="down" class="h-[18px] w-[18px]" %}
    <span class="text-xs font-medium tabular-nums text-red-700">{{ prediction.dislike_count }}</span>
  </span>

  <button type="button"
          class="group flex items-center rounded-full px-1 py-0.5 transition hover:text-brand-600"
          title="Share forecast"
          data-share-url="{{ request.scheme }}://{{ request.get_host }}{% url 'markets:detail' slug=prediction.market.slug %}#forecast-{{ prediction.id }}"
          data-share-title="{{ prediction.user.public_name }} on {{ prediction.market.title|truncatechars:40 }}"
          onclick="window.shareForumPost && window.shareForumPost(this)">
    <svg class="h-[18px] w-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" aria-hidden="true">
      <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="16 6 12 2 8 6" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="12" y1="2" x2="12" y2="15" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</div>
