{% load i18n %}
<button type="button"
        {% if button_id %}id="{{ button_id }}"{% endif %}
        class="{% if share_copy.tone == 'win' and not extra_class %}pr-touch-target inline-flex items-center gap-2 rounded-full bg-emerald-600 px-4 py-2 text-sm font-semibold text-white shadow-md transition hover:bg-emerald-700{% elif share_copy.tone == 'loss' and not extra_class %}pr-touch-target inline-flex items-center gap-2 rounded-full border border-slate-300 bg-white px-4 py-2 text-sm font-semibold text-slate-700 transition hover:bg-slate-50 dark:border-slate-600 dark:bg-slate-900 dark:text-slate-200 dark:hover:bg-slate-800{% else %}{{ extra_class|default:'pr-touch-target inline-flex items-center gap-1.5 rounded-full border border-slate-200 bg-white/90 px-3 py-1.5 text-sm font-semibold text-slate-700 transition hover:border-brand-200 hover:bg-brand-50 hover:text-brand-700 dark:border-slate-600 dark:bg-slate-900/60 dark:text-slate-200 dark:hover:border-brand-700 dark:hover:bg-brand-950/40 dark:hover:text-brand-300' }}{% endif %}"
        title="{{ share_copy.aria_label }}"
        aria-label="{{ share_copy.aria_label }}"
        data-share-url="{{ request.scheme }}://{{ request.get_host }}{% url 'prediction_card' prediction.id %}"
        data-share-title="{{ share_copy.title }}"
        data-share-text="{{ share_copy.text }}"
        data-share-sheet-title="{{ share_copy.sheet_title }}"
        data-share-ping="{% url 'prediction_card_share' prediction.id %}"
        onclick="window.shareForumPost && window.shareForumPost(this)">
  <i data-lucide="{{ icon|default:'share-2' }}" class="{{ icon_class|default:'h-4 w-4 shrink-0' }}" stroke-width="2" aria-hidden="true"></i>
  {% if not icon_only %}{% if label %}{{ label }}{% else %}{{ share_copy.button_label }}{% endif %}{% endif %}
</button>
