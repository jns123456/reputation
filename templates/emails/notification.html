{% extends "emails/base.html" %}
{% load i18n %}
{% block content %}
  <h1 style="margin:0 0 12px;font-size:20px;font-weight:700;color:#0f172a;">{{ subject }}</h1>
  <p style="margin:0 0 20px;font-size:15px;line-height:1.6;color:#475569;">
    {% blocktrans with name=recipient.public_name %}Hi {{ name }}, there's new activity on your PredictStamp account.{% endblocktrans %}
  </p>
  <a href="{{ action_url }}"
     style="display:inline-block;background:#4f46e5;color:#ffffff;text-decoration:none;font-weight:600;font-size:15px;padding:12px 22px;border-radius:10px;">
    {{ notification.action_label }} →
  </a>
{% endblock %}
